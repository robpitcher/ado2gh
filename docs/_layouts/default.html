<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --page-bg: #f0f1f3;
      --content-bg: #ffffff;
      --text: #1f2328;
      --text-secondary: #656d76;
      --border: #d0d7de;
      --code-bg: #f6f8fa;
      --link: #0969da;
      --blockquote-border: #0969da;
      --blockquote-bg: #ddf4ff;
      --table-stripe: #f6f8fa;
      --toggle-bg: #e8e8e8;
      --toggle-hover: #d0d0d0;
    }

    [data-theme="dark"] {
      --page-bg: #010409;
      --content-bg: #0d1117;
      --text: #e6edf3;
      --text-secondary: #8b949e;
      --border: #30363d;
      --code-bg: #161b22;
      --link: #58a6ff;
      --blockquote-border: #58a6ff;
      --blockquote-bg: #161b22;
      --table-stripe: #161b22;
      --toggle-bg: #30363d;
      --toggle-hover: #484f58;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: var(--page-bg);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.2s, color 0.2s;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      background: var(--content-bg);
      min-height: 100vh;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.06);
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: var(--toggle-bg);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      transition: background 0.2s, border-color 0.2s;
      z-index: 100;
    }

    .theme-toggle:hover { background: var(--toggle-hover); }

    .theme-toggle .icon-sun,
    .theme-toggle .icon-moon { display: none; }

    [data-theme="dark"] .theme-toggle .icon-sun { display: inline; }
    [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
    [data-theme="light"] .theme-toggle .icon-sun { display: none; }
    [data-theme="light"] .theme-toggle .icon-moon { display: inline; }

    h1, h2, h3, h4 { margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; }
    h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    h3 { font-size: 1.25em; }

    p { margin: 1em 0; }

    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    blockquote {
      border-left: 4px solid var(--blockquote-border);
      background: var(--blockquote-bg);
      padding: 0.75em 1em;
      margin: 1em 0;
      border-radius: 0 6px 6px 0;
    }

    blockquote p:first-child { margin-top: 0; }
    blockquote p:last-child { margin-bottom: 0; }

    code {
      background: var(--code-bg);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 0.85em;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }

    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1em;
      overflow-x: auto;
      margin: 1em 0;
    }

    pre code {
      background: none;
      padding: 0;
      border-radius: 0;
      font-size: 0.85em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      display: block;
      overflow-x: auto;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 0.5em 0.75em;
      text-align: left;
    }

    th {
      background: var(--code-bg);
      font-weight: 600;
    }

    tr:nth-child(even) { background: var(--table-stripe); }

    ul, ol { margin: 1em 0; padding-left: 2em; }
    li { margin: 0.25em 0; }

    strong { font-weight: 600; }

    @media (max-width: 600px) {
      .container { padding: 1rem; }
      h1 { font-size: 1.5em; }
      h2 { font-size: 1.25em; }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">
    <span class="icon-sun">☀️</span>
    <span class="icon-moon">🌙</span>
  </button>

  <div class="container">
    {{ content }}
  </div>

  <script>
    function getSystemTheme() {
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('theme', next);
    }

    // On load: use stored preference, or fall back to system theme
    const stored = localStorage.getItem('theme');
    applyTheme(stored || getSystemTheme());

    // Listen for system theme changes (only applies if no manual override)
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('theme')) {
        applyTheme(e.matches ? 'dark' : 'light');
      }
    });
  </script>
</body>
</html>
